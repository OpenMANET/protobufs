syntax = "proto3";

package openmanet.wifi_config.v1;

import "buf/validate/validate.proto";
import "google/protobuf/duration.proto";
import "openmanet/common/v1/options.proto";

// WifiBand identifies the frequency band of a wireless radio.
enum WifiBand {
  WIFI_BAND_UNSPECIFIED = 0;

  WIFI_BAND_2G = 1 [(openmanet.common.v1.string_name) = "2g"];

  WIFI_BAND_5G = 2 [(openmanet.common.v1.string_name) = "5g"];

  WIFI_BAND_6G = 3 [(openmanet.common.v1.string_name) = "6g"];

  WIFI_BAND_S1G = 4 [(openmanet.common.v1.string_name) = "s1g"];

  WIFI_BAND_60G = 5 [(openmanet.common.v1.string_name) = "60g"];
}

// WifiMode identifies the operating mode of a wireless interface.
enum WifiMode {
  WIFI_MODE_UNSPECIFIED = 0;

  WIFI_MODE_AP = 1 [(openmanet.common.v1.string_name) = "ap"];

  WIFI_MODE_MESH = 2 [(openmanet.common.v1.string_name) = "mesh"];

  WIFI_MODE_STA = 3 [(openmanet.common.v1.string_name) = "sta"];

  WIFI_MODE_ADHOC = 4 [(openmanet.common.v1.string_name) = "adhoc"];

  WIFI_MODE_MONITOR = 5 [(openmanet.common.v1.string_name) = "monitor"];
}

// WifiEncryption identifies the encryption method for a wireless interface.
enum WifiEncryption {
  WIFI_ENCRYPTION_UNSPECIFIED = 0;

  WIFI_ENCRYPTION_SAE = 1 [(openmanet.common.v1.string_name) = "sae"];

  WIFI_ENCRYPTION_PSK2 = 2 [(openmanet.common.v1.string_name) = "psk2"];

  WIFI_ENCRYPTION_PSK = 3 [(openmanet.common.v1.string_name) = "psk"];

  WIFI_ENCRYPTION_PSK_MIXED = 4 [(openmanet.common.v1.string_name) = "psk-mixed"];

  WIFI_ENCRYPTION_NONE = 5 [(openmanet.common.v1.string_name) = "none"];

  WIFI_ENCRYPTION_OWE = 6 [(openmanet.common.v1.string_name) = "owe"];
}

// WifiHTMode identifies the high-throughput / channel-width mode.
enum WifiHTMode {
  WIFI_HT_MODE_UNSPECIFIED = 0;

  WIFI_HT_MODE_NOHT = 1 [(openmanet.common.v1.string_name) = "NOHT"];

  WIFI_HT_MODE_HT20 = 2 [(openmanet.common.v1.string_name) = "HT20"];

  WIFI_HT_MODE_HT40_MINUS = 3 [(openmanet.common.v1.string_name) = "HT40-"];

  WIFI_HT_MODE_HT40_PLUS = 4 [(openmanet.common.v1.string_name) = "HT40+"];

  WIFI_HT_MODE_HT40 = 5 [(openmanet.common.v1.string_name) = "HT40"];

  WIFI_HT_MODE_VHT20 = 6 [(openmanet.common.v1.string_name) = "VHT20"];

  WIFI_HT_MODE_VHT40 = 7 [(openmanet.common.v1.string_name) = "VHT40"];

  WIFI_HT_MODE_VHT80 = 8 [(openmanet.common.v1.string_name) = "VHT80"];

  WIFI_HT_MODE_VHT160 = 9 [(openmanet.common.v1.string_name) = "VHT160"];

  WIFI_HT_MODE_HE20 = 10 [(openmanet.common.v1.string_name) = "HE20"];

  WIFI_HT_MODE_HE40 = 11 [(openmanet.common.v1.string_name) = "HE40"];

  WIFI_HT_MODE_HE80 = 12 [(openmanet.common.v1.string_name) = "HE80"];

  WIFI_HT_MODE_HE160 = 13 [(openmanet.common.v1.string_name) = "HE160"];

  WIFI_HT_MODE_S1G_1MHZ = 14 [(openmanet.common.v1.string_name) = "1 MHz"];

  WIFI_HT_MODE_S1G_2MHZ = 15 [(openmanet.common.v1.string_name) = "2 MHz"];

  WIFI_HT_MODE_S1G_4MHZ = 16 [(openmanet.common.v1.string_name) = "4 MHz"];

  WIFI_HT_MODE_S1G_8MHZ = 17 [(openmanet.common.v1.string_name) = "8 MHz"];
}

// Radio identifies a physical wireless radio on the device.
message Radio {
  // UCI device section name, e.g. "radio2".
  string name = 1;

  // Human-readable label for the radio tab, e.g. "2.4 GHz Radio (MT7603E)".
  string display_name = 2;

  // Chipset or hardware name from iwinfo, e.g. "MediaTek MT7603E".
  string hardware_name = 3;

  // Frequency band of the radio.
  WifiBand band = 4;

  // UCI wifi-iface section name linked to this radio, e.g. "default_radio2".
  string interface_name = 5;
}

// RadioStatus contains read-only runtime information for a radio.
message RadioStatus {
  // Whether the radio is currently active.
  bool active = 1;

  // Current SSID being broadcast or joined.
  string ssid = 2;

  // Operating mode display string, e.g. "Access Point" or "Mesh Point (802.11s)".
  string mode = 3;

  // Current channel number.
  int32 channel = 4;

  // Center frequency in MHz, e.g. 2412 or 923.
  int32 frequency = 5;

  // Current bandwidth display string, e.g. "20 MHz" or "4 MHz".
  string bandwidth = 6;

  // Encryption display string, e.g. "WPA3-SAE" or "WPA2-PSK (CCMP)".
  string encryption = 7;

  // Current transmit power in dBm.
  int32 tx_power = 8;

  // Number of connected AP clients (only for AP-mode radios).
  int32 connected_clients = 9;

  // Number of mesh peers (only for mesh-mode radios).
  int32 mesh_peers = 10;

  // Structured operating mode for programmatic use.
  WifiMode wifi_mode = 11;
}

// RadioSettings contains the editable configuration for a radio.
message RadioSettings {
  // SSID (network name).
  string ssid = 1 [
    (buf.validate.field).string = {
      min_len: 1
      max_len: 32
    },
    (buf.validate.field).string.example = "openmanet",
    (buf.validate.field).string.example = "my-wifi-network"
  ];

  // Mesh ID (only for mesh-mode radios).
  optional string mesh_id = 2 [
    (buf.validate.field).string.max_len = 32,
    (buf.validate.field).string.example = "openmanet-mesh"
  ];

  // Passphrase / pre-shared key. Write-only: never returned on reads.
  optional string password = 3 [(buf.validate.field).string.max_len = 63];

  // Channel number as a string (e.g. "1", "42", "auto").
  string channel = 4 [
    (buf.validate.field).string.example = "1",
    (buf.validate.field).string.example = "6",
    (buf.validate.field).string.example = "36",
    (buf.validate.field).string.example = "149"
  ];

  // HTMode / channel-width setting.
  WifiHTMode bandwidth = 5;

  // Transmit power in dBm.
  int32 tx_power = 6 [
    (buf.validate.field).int32 = {
      gte: 0
      lte: 30
    },
    (buf.validate.field).int32.example = 10,
    (buf.validate.field).int32.example = 15,
    (buf.validate.field).int32.example = 20
  ];

  // Country code (e.g. "US").
  optional string country = 7 [
    (buf.validate.field).string.max_len = 2,
    (buf.validate.field).string.example = "US",
    (buf.validate.field).string.example = "DE"
  ];

  // Encryption method. UNSPECIFIED means "do not change" on updates.
  WifiEncryption encryption = 8;

  // Whether the radio is disabled.
  optional bool disabled = 9;

  // Operating mode. UNSPECIFIED means "do not change" on updates.
  WifiMode mode = 10;
}

// ConnectedClient represents an AP-connected wireless client.
message ConnectedClient {
  // Hostname resolved from DHCP leases, or empty if unknown.
  string hostname = 1;

  // MAC address of the client.
  string mac_address = 2;

  // Signal strength in dBm.
  int32 signal_dbm = 3;

  // Receive bitrate in bits per second.
  int64 rx_rate_bps = 4;

  // Transmit bitrate in bits per second.
  int64 tx_rate_bps = 5;

  // Time since the client connected.
  google.protobuf.Duration connected = 6;
}

// MeshPeer represents a peer in a wireless mesh network.
message MeshPeer {
  // Hostname resolved from bat-hosts, or empty if unknown.
  string hostname = 1;

  // MAC address of the peer.
  string mac_address = 2;

  // Signal strength in dBm.
  int32 signal_dbm = 3;

  // Throughput in megabits per second.
  double throughput_mbps = 4;

  // Time since the peer was last seen.
  google.protobuf.Duration last_seen = 5;
}
