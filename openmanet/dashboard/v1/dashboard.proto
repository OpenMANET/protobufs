syntax = "proto3";

package openmanet.dashboard.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// DeviceInfo describes the hardware and software identity of the device.
message DeviceInfo {
  // The hostname of the device.
  string hostname = 1;

  // The hardware model name (e.g. "MorseMicro HaLowLink 2").
  string model = 2;

  // The firmware version string (e.g. "OpenWrt 23.05.3 / OpenMANET 1.7.0").
  string firmware = 3;

  // The Linux kernel version (e.g. "5.15.150").
  string kernel = 4;

  // The CPU architecture (e.g. "mipsel_24kc").
  string architecture = 5;
}

// SystemResources describes the current resource utilisation of the device.
message SystemResources {
  // Time since last boot.
  google.protobuf.Duration uptime = 1;

  // Current local wall-clock time on the device.
  google.protobuf.Timestamp local_time = 2;

  // Instantaneous CPU load expressed as a percentage (0–100).
  float cpu_load_percent = 3;

  // Total physical memory in bytes.
  int64 memory_total_bytes = 4;

  // Currently used memory in bytes (total − available).
  int64 memory_used_bytes = 5;

  // Total overlay filesystem capacity in bytes.
  int64 overlay_total_bytes = 6;

  // Currently used overlay filesystem space in bytes.
  int64 overlay_used_bytes = 7;
}

// NetworkInterfaceState indicates the connectivity state of a network entry.
enum NetworkInterfaceState {
  NETWORK_INTERFACE_STATE_UNSPECIFIED = 0;
  NETWORK_INTERFACE_STATE_CONNECTED = 1;
  NETWORK_INTERFACE_STATE_DISCONNECTED = 2;
  NETWORK_INTERFACE_STATE_NOT_CONNECTED = 3;
}

// NetworkSummaryEntry describes one line in the network summary panel.
message NetworkSummaryEntry {
  // The kernel interface name (e.g. "eth0", "br-ahwlan", "bat0").
  string interface_name = 1;

  // A human-friendly label (e.g. "WAN (eth0)", "LAN (br-ahwlan)").
  string display_name = 2;

  // Current connectivity state of this entry.
  NetworkInterfaceState state = 3;

  // Free-form detail string shown next to the entry, such as an IP/CIDR,
  // "Connected — 3 neighbors", "4 originators", or "Not connected".
  string detail = 4;

  // Cumulative received bytes counter from the kernel since interface
  // creation (netlink RX_BYTES). Zero when the interface does not exist
  // or carries no traffic.
  uint64 rx_bytes = 5;

  // Cumulative transmitted bytes counter from the kernel since interface
  // creation (netlink TX_BYTES). Zero when the interface does not exist
  // or carries no traffic.
  uint64 tx_bytes = 6;
}

// NetworkSummary is the collection of network summary entries.
message NetworkSummary {
  // One entry per notable interface / subsystem.
  repeated NetworkSummaryEntry entries = 1;
}

// ServiceStatus indicates whether a monitored service is running or stopped.
enum ServiceStatus {
  SERVICE_STATUS_UNSPECIFIED = 0;
  SERVICE_STATUS_RUNNING = 1;
  SERVICE_STATUS_STOPPED = 2;
}

// ServiceInfo describes the runtime state of a single system service.
message ServiceInfo {
  // The service name (e.g. "openmanetd", "dnsmasq").
  string name = 1;

  // Whether the service is currently running.
  ServiceStatus status = 2;

  // The PID of the running process, or 0 if not running.
  int32 pid = 3;
}

// QuickAction enumerates the actions a client may request.
enum QuickAction {
  QUICK_ACTION_UNSPECIFIED = 0;
  QUICK_ACTION_REBOOT_DEVICE = 1;
  QUICK_ACTION_RESTART_NETWORK = 2;
  QUICK_ACTION_RESTART_OPENMANETD = 3;
}

// GetDashboardStatusResponse contains all data needed to render the dashboard.
message GetDashboardStatusResponse {
  // Hardware and software identity.
  DeviceInfo device_info = 1;

  // Current resource utilisation.
  SystemResources system_resources = 2;

  // Network interface / subsystem summary.
  NetworkSummary network_summary = 3;

  // Status of monitored system services.
  repeated ServiceInfo active_services = 4;
}

// ExecuteQuickActionRequest identifies the action to perform.
message ExecuteQuickActionRequest {
  // The action to execute.
  QuickAction action = 1;
}

// ExecuteQuickActionResponse reports the outcome of an action.
message ExecuteQuickActionResponse {
  // Whether the action was accepted and initiated.
  bool success = 1;

  // Optional human-readable detail about the outcome.
  optional string message = 2;
}
