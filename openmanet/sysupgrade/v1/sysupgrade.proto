syntax = "proto3";

package openmanet.sysupgrade.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// SystemInfo describes the running OpenMANET/OpenWrt system in the level
// of detail required to decide whether a sysupgrade is possible and which
// firmware image to choose.
message SystemInfo {
  // Hostname is the kernel hostname (e.g. "BCM2711-1003").
  string hostname = 1;

  // Distribution is DISTRIB_ID, e.g. "OpenWrt".
  string distribution = 2;

  // Release is DISTRIB_RELEASE, e.g. "23.05.3".
  string release = 3;

  // Revision is DISTRIB_REVISION, e.g. "r23809-234f1a2efa".
  string revision = 4;

  // Target is DISTRIB_TARGET, e.g. "bcm27xx/bcm2711". This is the key
  // used to match the device to the correct sysupgrade firmware image.
  string target = 5;

  // BoardName is /etc/board.json model.id, e.g. "bcm2711,mm8108-usb".
  string board_name = 6;

  // Model is the human-friendly model name, e.g. "RPI RPI4-MM8108 (USB)".
  string model = 7;

  // Description is DISTRIB_DESCRIPTION, e.g. "OpenWrt 23.05.3 / OpenMANET 1.7.0".
  string description = 8;

  // OpenmanetVersion is the OpenMANET semver parsed from description,
  // e.g. "1.7.0". Empty when the description does not contain a
  // recognizable OpenMANET version.
  string openmanet_version = 9;

  // Kernel is the running kernel version, e.g. "6.6.102".
  string kernel = 10;

  // Architecture is the CPU machine name, e.g. "aarch64".
  string architecture = 11;

  // BuildDate is DISTRIB_BUILD_DATE when present.
  string build_date = 12;

  // SysupgradeCapable is true when all preconditions (binary present,
  // squashfs root, /overlay mounted) are satisfied.
  bool sysupgrade_capable = 13;

  // SysupgradeCapableReason is a short human-readable summary of why
  // SysupgradeCapable is the value it is, e.g. "ok", "no
  // /sbin/sysupgrade", "rootfs is ext4, not squashfs".
  string sysupgrade_capable_reason = 14;

  // RootfsType is the filesystem type of the root mount, e.g.
  // "squashfs".
  string rootfs_type = 15;
}

// Asset is a single binary file attached to a GitHub release.
message Asset {
  // Name is the filename, e.g.
  // "openmanet-1.8.0-bcm27xx-bcm2711-mm8108-usb-squashfs-sysupgrade.img.gz".
  string name = 1;

  // DownloadUrl is the public download URL for this asset.
  string download_url = 2;

  // SizeBytes is the file size in bytes.
  int64 size_bytes = 3;
}

// Release is a single OpenMANET firmware release.
message Release {
  // Tag is the GitHub release tag, e.g. "v1.8.0".
  string tag = 1;

  // Name is the human-friendly release name (often the same as tag).
  string name = 2;

  // Body is the release notes (markdown).
  string body = 3;

  // PublishedAt is the GitHub publication timestamp.
  google.protobuf.Timestamp published_at = 4;

  // Prerelease is true when GitHub marked this release as a pre-release.
  bool prerelease = 5;

  // Version is the parsed semver of the tag, e.g. "1.8.0". Empty when
  // the tag does not parse.
  string version = 6;

  // Assets is the list of files attached to this release.
  repeated Asset assets = 7;
}

// Update is a single available upgrade target — a release combined with
// the asset that matches the local hardware.
message Update {
  // Release is the upgrade's release metadata.
  Release release = 1;

  // MatchedAsset is the asset filename selected for the local hardware.
  Asset matched_asset = 2;

  // NewerThanCurrent is true when the release version is strictly
  // greater than the locally installed OpenMANET version. False when
  // the current version cannot be parsed.
  bool newer_than_current = 3;
}

// SysupgradeOptions maps directly to the OpenWrt sysupgrade(1) script
// flags. Booleans become the corresponding flag when true; string fields
// become "-x value" when non-empty.
message SysupgradeOptions {
  // -n: do NOT preserve config (incompatible with preserve_changed_etc).
  bool no_preserve_config = 1;

  // -c: preserve changed files in /etc/.
  bool preserve_changed_etc = 2;

  // -o: preserve all files in / (overlay).
  bool preserve_overlay = 3;

  // -u: skip from-package files when saving config.
  bool skip_package_files = 4;

  // -k: include /etc/config and files from sysupgrade.conf in the saved
  // configuration archive.
  bool include_etc_config = 5;

  // -f <path>: restore configuration from this .tar.gz before flashing.
  string config_archive_path = 6 [(buf.validate.field).string.max_len = 256];

  // -T: verify image and config archive without performing the upgrade.
  bool test_only = 7;

  // -F: flash even if checks fail (force).
  bool force = 8;

  // -q: less verbose.
  bool quiet = 9;

  // -v: more verbose.
  bool verbose = 10;

  // -b <path>: create a backup at this path instead of upgrading.
  string backup_path = 11 [(buf.validate.field).string.max_len = 256];

  // -r <path>: restore a backup at this path instead of upgrading.
  string restore_path = 12 [(buf.validate.field).string.max_len = 256];

  // -p: preserve partition table entries (specific images only).
  bool preserve_partitions = 13;

  // -e: erase partitions (specific platforms only).
  bool erase_partitions = 14;
}

// Phase is the high-level state of the sysupgrade manager.
enum Phase {
  PHASE_UNSPECIFIED = 0;
  PHASE_IDLE = 1;
  PHASE_CHECKING = 2;
  PHASE_DOWNLOADING = 3;
  PHASE_VERIFYING = 4;
  PHASE_READY = 5;
  PHASE_UPGRADING = 6;
  PHASE_FAILED = 7;
}

// ProgressEvent is one observable transition or per-chunk progress
// update emitted by the sysupgrade manager. Streamed via
// StreamUpgradeProgress and also returned as a snapshot by
// GetUpgradeStatus.
message ProgressEvent {
  // Phase is the current high-level state.
  Phase phase = 1;

  // Percent is the per-phase progress, 0-100. Meaningful only for
  // phase=PHASE_DOWNLOADING.
  int32 percent = 2;

  // BytesDone is the number of bytes downloaded so far.
  int64 bytes_done = 3;

  // BytesTotal is the total byte count of the in-flight asset (-1 if
  // not yet known).
  int64 bytes_total = 4;

  // Message is a short human-readable status line.
  string message = 5;

  // Error is non-empty when phase=PHASE_FAILED.
  string error = 6;

  // ReleaseTag is the currently-selected release tag, if any.
  string release_tag = 7;

  // AssetName is the currently-selected asset filename, if any.
  string asset_name = 8;

  // ChildPid is populated once sysupgrade has been exec'd with
  // setsid+nohup; zero before that.
  int32 child_pid = 9;

  // UpdatedAt is the timestamp this event was generated.
  google.protobuf.Timestamp updated_at = 10;
}
