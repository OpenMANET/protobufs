syntax = "proto3";

package openmanet.setup.v1;

import "google/protobuf/empty.proto";
import "openmanet/setup/v1/setup.proto";

// SetupService runs the first-boot setup wizard.
//
// Both RPCs are exempt from authentication (see internal/auth/middleware.go
// isAPISkipPath). The middleware additionally rejects them when
// `setup.enabled=false` (CodeUnavailable) or `setup.complete=true`
// (CodeFailedPrecondition). The handler enforces the same conditions
// as defense-in-depth.
service SetupService {
  // GetSetupStatus reports whether the wizard is reachable on this
  // device and provides the hardware context (radios, ethernet ports,
  // hostname) the wizard needs to render its first screen. Always
  // exempt from auth so the frontend can poll it before the user has
  // any credentials.
  rpc GetSetupStatus(google.protobuf.Empty) returns (GetSetupStatusResponse);

  // ApplySetup atomically applies a complete MeshNodeProfile. The RPC
  // is server-streaming: each phase emits STATUS_STARTED on entry and
  // STATUS_DONE / STATUS_FAILED on exit, plus a terminal event carrying
  // ApplySetupResult.
  //
  // The terminal event is emitted BEFORE service reloads so the
  // frontend receives a clean success / failure signal even when the
  // network reconfiguration severs the streaming connection. Frontend
  // clients should treat an abrupt stream end (no terminal event seen)
  // as ambiguous and fall back to polling GetSetupStatus.
  rpc ApplySetup(ApplySetupRequest) returns (stream ApplySetupResponse);
}
