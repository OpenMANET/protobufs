syntax = "proto3";

package openmanet.comms.v1;

import "google/protobuf/descriptor.proto";

extend google.protobuf.EnumValueOptions {
  optional string string_name = 123456789;
}

enum ControlSource {
  CONTROL_SOURCE_CM108 = 0 [
    (string_name) = "cm108"
  ];

  CONTROL_SOURCE_NANOPTT = 1 [
    (string_name) = "nanoptt"
  ];

  CONTROL_SOURCE_WEB = 2 [
    (string_name) = "web"
  ];
}

// GetCommsConfigResponse is used to request the current communications configuration.
message GetCommsConfigResponse {
  // Whether the comms subsystem is currently enabled.
  bool comms_enabled = 1;
  // The source of control for the comms subsystem.
  ControlSource control_source = 2;
}

// UpdateCommsConfigRequest is used to update the communications configuration.
message UpdateCommsConfigRequest {
  // Whether to enable or disable the comms subsystem.
  bool enable_comms = 1;
  // The source of control for the comms subsystem.
  ControlSource control_source = 2;
}

// UpdateCommsConfigResponse is returned after an UpdateCommsConfig request.
message UpdateCommsConfigResponse {}
